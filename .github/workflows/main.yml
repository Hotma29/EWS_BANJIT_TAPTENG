name: Auto Weather Fetcher
on:
  schedule:
    - cron: '0 * * * *' # Berjalan otomatis setiap jam
  workflow_dispatch: # Tombol manual untuk testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Update ke v4 (lebih stabil & cepat)

      - name: Set up Python
        uses: actions/setup-python@v4 # Update ke v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # PENTING: Pin scikit-learn ke versi 1.6.1 sesuai versi saat training model final
          pip install pandas requests psycopg2-binary joblib scikit-learn==1.6.1

      - name: Run Worker
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python worker.py
